description: >-
  Affirm is a financial technology company that provides buy now, pay later financing
  for consumers at the point of sale across thousands of online and in-store merchants.
  Affirm offers a suite of developer APIs and SDKs enabling merchants to embed flexible
  installment payment options directly into their checkout flows, mobile apps, and
  marketing experiences.
