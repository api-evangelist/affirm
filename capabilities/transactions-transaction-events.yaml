naftiko: 1.0.0-alpha2
info:
  label: Affirm Transactions API — Transaction Events
  description: 'Affirm Transactions API — Transaction Events. 1 operations. Lead operation: Affirm List Transaction Events.
    Self-contained Naftiko capability covering one Affirm business surface.'
  tags:
  - Affirm
  - Transaction Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AFFIRM_API_KEY: AFFIRM_API_KEY
capability:
  consumes:
  - type: http
    namespace: transactions-transaction-events
    baseUri: https://api.affirm.com/api/v1
    description: Affirm Transactions API — Transaction Events business capability. Self-contained, no shared references.
    resources:
    - name: transaction_events
      path: /transaction_events
      operations:
      - name: listtransactionevents
        method: GET
        description: Affirm List Transaction Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.AFFIRM_USER}}'
      password: '{{env.AFFIRM_PASS}}'
  exposes:
  - type: rest
    namespace: transactions-transaction-events-rest
    port: 8080
    description: REST adapter for Affirm Transactions API — Transaction Events. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/transaction-events
      name: transaction-events
      description: REST surface for transaction_events.
      operations:
      - method: GET
        name: listtransactionevents
        description: Affirm List Transaction Events
        call: transactions-transaction-events.listtransactionevents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transactions-transaction-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Affirm Transactions API — Transaction Events. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: affirm-list-transaction-events
      description: Affirm List Transaction Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transactions-transaction-events.listtransactionevents
      outputParameters:
      - type: object
        mapping: $.
