naftiko: "1.0.0-alpha1"

info:
  label: "Affirm Disputes API"
  description: "Shared capability definition for the Affirm Disputes API covering dispute retrieval, evidence submission, and dispute closure."
  tags:
    - Affirm
    - Disputes
    - Chargebacks
    - Payments
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AFFIRM_PUBLIC_KEY: AFFIRM_PUBLIC_KEY
      AFFIRM_PRIVATE_KEY: AFFIRM_PRIVATE_KEY

capability:
  consumes:
    - type: http
      namespace: affirm-disputes
      baseUri: https://api.affirm.com/api/v1
      description: "Affirm Disputes API for managing payment disputes."
      authentication:
        type: basic
        username: "{{AFFIRM_PUBLIC_KEY}}"
        password: "{{AFFIRM_PRIVATE_KEY}}"
      resources:
        - name: disputes
          path: /disputes
          description: "Dispute management operations."
          operations:
            - name: list-disputes
              method: GET
              description: "List all disputes."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dispute-by-id
          path: /disputes/{dispute_id}
          description: "Operations on a specific dispute."
          operations:
            - name: get-dispute
              method: GET
              description: "Retrieve a dispute by ID."
              inputParameters:
                - name: dispute_id
                  in: path
                  type: string
                  required: true
                  description: "Dispute ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: close-dispute
              method: POST
              description: "Close a dispute."
              inputParameters:
                - name: dispute_id
                  in: path
                  type: string
                  required: true
                  description: "Dispute ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: submit-dispute-evidence
              method: POST
              description: "Submit evidence for a dispute."
              inputParameters:
                - name: dispute_id
                  in: path
                  type: string
                  required: true
                  description: "Dispute ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: affirm-disputes-api
      resources:
        - path: /v1/disputes
          name: disputes
          description: "Dispute management."
          operations:
            - method: GET
              name: list-disputes
              description: "List disputes."
              call: "affirm-disputes.list-disputes"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: affirm-disputes-mcp
      transport: http
      tools:
        - name: list-disputes
          description: "List all Affirm payment disputes."
          hints:
            readOnly: true
            destructive: false
          call: "affirm-disputes.list-disputes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dispute
          description: "Get details of a specific Affirm dispute."
          hints:
            readOnly: true
            destructive: false
          call: "affirm-disputes.get-dispute"
          with:
            dispute_id: "tools.dispute_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-dispute-evidence
          description: "Submit evidence to contest an Affirm dispute."
          hints:
            readOnly: false
            destructive: false
          call: "affirm-disputes.submit-dispute-evidence"
          with:
            dispute_id: "tools.dispute_id"
          outputParameters:
            - type: object
              mapping: "$."
