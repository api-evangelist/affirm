specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: affirm
providerId: affirm
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Affirm bills merchants via a take-rate (MDR + fixed fee) model. Specific rates are not
  published and are negotiated per merchant.
tags:
  - FinOps
  - FOCUS
  - Payments
  - BNPL
description: 'FOCUS-aligned FinOps for Affirm: take-rate-based merchant billing for Buy-Now-Pay-Later
  consumer financing.'
sources:
  - https://www.affirm.com/business
  - https://docs.affirm.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Affirm, Inc.
serviceCategory: Payments / BNPL
billingModel:
  pricingCategory: Take Rate
  billingFrequency: Continuous Settlement
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Refund
    - Adjustment
focusColumns:
  ServiceName: Affirm
  ServiceCategory: Payments / BNPL
  ProviderName: Affirm
  PublisherName: Affirm, Inc.
  InvoiceIssuerName: Affirm, Inc.
  BillingCurrency: USD
meters:
  - name: completed_loans
    unit: loan
    aggregation: sum
    dimensions:
      - product
      - term
      - merchant
  - name: gmv
    unit: USD
    aggregation: sum
    dimensions:
      - merchant
      - product
  - name: merchant_discount
    unit: USD
    aggregation: sum
    dimensions:
      - merchant
  - name: per_transaction_fee
    unit: USD
    aggregation: sum
    dimensions:
      - merchant
  - name: refunds
    unit: USD
    aggregation: sum
    dimensions:
      - merchant
principles:
  - name: Visibility
    description: Use Affirm Merchant Dashboard / settlement reports to track GMV, MDR, fees, and
      refunds at order grain.
  - name: Allocation
    description: Tag Affirm checkout sessions with the consuming product/team for chargeback in
      multi-brand merchants.
  - name: Optimization
    description: Negotiate MDR breakpoints by GMV; route shorter-term Pay-in-4 vs longer-term
      installment based on AOV; monitor lift vs cost.
  - name: Accountability
    description: Assign payments-finance owner; reconcile monthly Affirm settlements against
      ledger; investigate take-rate variance.
